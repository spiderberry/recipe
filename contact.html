<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/styles.css">
    <title>Contact - Eats</title>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo-link">
                <img src="assets/images/logo.jpg" alt="Eats Logo" id="nav-logo">
            </a>
            <a href="index.html">Home</a>
            <a href="recipes.html">Recipes</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>
    </header>

    <main>
        <section class="contact-section">
            <h1>Contact Us</h1>

            <img src="assets/images/logo.png" alt="Eats logo" id="contact-logo">
            <p>Eats</p>
            <p>If you have any questions, suggestions, or feedback, please feel free to reach out to us!</p>
            <p>help@eats.com</p>
            <p>US: 732-555-0123</p>
            <p>Our Office Hours: Mon-Fri 9am-5pm EST</p>
            <form class="contact-form">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <button type="submit" class="btn">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Eats. All rights reserved.</p>
        <a href="https://www.instagram.com" target="_blank" rel="noopener noreferrer">
            <img src="assets/images/icon-instagram.png" alt="Instagram Icon" class="footer-icon">
        </a>
        <a href="https://www.twitter.com" target="_blank" rel="noopener noreferrer">
            <img src="assets/images/icon-twitter.png" alt="Twitter Icon" class="footer-icon">
        </a>
        <a href="https://www.youtube.com" target="_blank" rel="noopener noreferrer">
            <img src="assets/images/icon-youtube.png" alt="YouTube Icon" class="footer-icon">
        </a>
    </footer>
</body>
</html>
